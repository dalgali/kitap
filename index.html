<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitap Kurdu | Yaz Okuma Paneli</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&display=swap&subset=latin-ext" rel="stylesheet">
    <style>
        html { background: #6d28d9; }
        body { font-family: 'Comfortaa', cursive; }
        .cool-card { transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .cool-card:hover { 
            transform: translateY(-6px) rotate(-1deg); 
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
        }
    </style>
</head>
<body class="bg-gradient-to-b from-indigo-50 via-purple-50 to-pink-50 text-slate-800 min-h-screen antialiased flex flex-col justify-between">

    <header class="bg-gradient-to-r from-violet-600 via-indigo-600 to-purple-600 text-white py-8 px-4 shadow-xl text-center relative overflow-hidden">
        <div class="absolute -top-10 -left-10 w-32 h-32 bg-yellow-300 opacity-20 rounded-full blur-xl"></div>
        <div class="absolute -bottom-10 -right-10 w-40 h-40 bg-pink-400 opacity-20 rounded-full blur-xl"></div>
        <h1 class="text-3xl md:text-5xl font-bold tracking-wide drop-shadow-md flex justify-center items-center gap-3">
            Kitap Kurdu Dünyası
        </h1>
        <p class="text-xs md:text-base text-indigo-100 mt-2 tracking-wider">
            Bu yaz okuduğun kitapları paylaş, arkadaşlarına ilham ol.
        </p>
    </header>

    <main class="max-w-6xl w-full mx-auto p-4 md:p-6 space-y-12 my-4 flex-grow">
        
        <div class="max-w-2xl mx-auto bg-white rounded-3xl shadow-xl p-6 md:p-8 border-4 border-purple-200 relative">
            <form id="readingForm" class="space-y-6">
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-bold text-indigo-600 mb-1">Adın ve Soyadın</label>
                        <input type="text" id="adSoyad" required maxlength="60" autocomplete="name" placeholder="Örnek: Cemal Dalgalı" class="w-full h-14 px-4 bg-slate-50 border-2 border-slate-200 rounded-2xl focus:outline-none focus:border-indigo-500 font-medium text-sm transition">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-indigo-600 mb-1">Okul Numaran</label>
                        <input type="number" id="okulNo" required min="1" max="99999" placeholder="Örnek: 1985" class="w-full h-14 px-4 bg-slate-50 border-2 border-slate-200 rounded-2xl focus:outline-none focus:border-indigo-500 font-medium text-sm transition">
                    </div>
                    <div class="sm:col-span-2">
                        <label class="block text-sm font-bold text-indigo-600 mb-1">Sınıf Kodu</label>
                        <input type="text" id="sinifKodu" required maxlength="12" autocomplete="off" autocapitalize="characters" placeholder="Öğretmeninden aldığın kod" class="w-full h-14 px-4 bg-slate-50 border-2 border-slate-200 rounded-2xl focus:outline-none focus:border-indigo-500 font-medium text-sm transition">
                    </div>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-bold text-indigo-600 mb-1">Sınıfın</label>
                        <select id="sinif" required class="w-full h-14 px-4 bg-slate-50 border-2 border-slate-200 rounded-2xl focus:outline-none focus:border-indigo-500 font-medium text-sm bg-white transition">
                            <option value="">Seç..</option>
                            <option value="5">5. Sınıf</option>
                            <option value="6">6. Sınıf</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-indigo-600 mb-1">Şuben</label>
                        <select id="sube" required class="w-full h-14 px-4 bg-slate-50 border-2 border-slate-200 rounded-2xl focus:outline-none focus:border-indigo-500 font-medium text-sm bg-white transition">
                            <option value="">Seç..</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-bold text-indigo-600 mb-1">Okuduğun Kitabın Adı</label>
                    <input type="text" id="kitapAdi" required maxlength="90" placeholder="Kitabın adını buraya yazar mısın?" class="w-full h-14 px-4 bg-slate-50 border-2 border-slate-200 rounded-2xl focus:outline-none focus:border-indigo-500 font-medium text-sm transition">
                </div>

                <div>
                    <label class="block text-sm font-bold text-indigo-600 mb-1">Kitaba Puanın Kaç?</label>
                    <div class="flex items-center space-x-3 mt-2 bg-purple-50 p-3 rounded-2xl w-fit border border-purple-100">
                        <div id="starContainer" class="flex text-3xl text-slate-300 cursor-pointer touch-manipulation">
                            <span class="star-btn select-none leading-none" data-value="1">☆</span>
                            <span class="star-btn ml-1 select-none leading-none" data-value="2">☆</span>
                            <span class="star-btn ml-1 select-none leading-none" data-value="3">☆</span>
                            <span class="star-btn ml-1 select-none leading-none" data-value="4">☆</span>
                            <span class="star-btn ml-1 select-none leading-none" data-value="5">☆</span>
                        </div>
                        <span id="puanLabel" class="text-xs font-bold text-purple-600 bg-white px-3 py-1 rounded-full shadow-xs">(Seçmedin)</span>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-bold text-indigo-600 mb-1">Kitabı Anlatan En İyi Üç Kelime</label>
                    <input type="text" id="ucKelime" maxlength="60" placeholder="Örnek: sürükleyici, komik, heyecanlı" class="w-full px-4 py-3 bg-slate-50 border-2 border-slate-200 rounded-2xl focus:outline-none focus:border-indigo-500 font-medium text-sm transition">
                </div>

                <div>
                    <label class="block text-sm font-bold text-indigo-600 mb-1">Kitapta Beğendiğin En Güzel Alıntı Cümle</label>
                    <textarea id="alintiCumle" rows="2" maxlength="220" placeholder="Kitaptan aklında kalan güzel bir cümle..." class="w-full px-4 py-3 bg-slate-50 border-2 border-slate-200 rounded-2xl focus:outline-none focus:border-indigo-500 font-medium text-sm transition resize-none"></textarea>
                </div>

                <div>
                    <label class="block text-sm font-bold text-indigo-600 mb-1">Arkadaşlarına Önerir misin?</label>
                    <select id="onerirMi" required class="w-full h-14 px-4 bg-slate-50 border-2 border-slate-200 rounded-2xl focus:outline-none focus:border-indigo-500 font-medium text-sm bg-white transition">
                        <option value="">Seç..</option>
                        <option value="Evet">Evet</option>
                        <option value="Hayır">Hayır</option>
                        <option value="Kararsızım">Kararsızım</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-bold text-indigo-600 mb-1">Kitap Hakkında Ne Düşünüyorsun?</label>
                    <textarea id="yorum" required rows="3" maxlength="500" placeholder="Sence bu kitap nasıldı? En sevdiğin karakter kim oldu? Kısaca bahset..." class="w-full px-4 py-3 bg-slate-50 border-2 border-slate-200 rounded-2xl focus:outline-none focus:border-indigo-500 font-medium text-sm transition resize-none"></textarea>
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-600 hover:to-teal-600 text-white font-bold py-4 px-6 rounded-2xl transition duration-200 text-base shadow-lg hover:shadow-xl transform active:scale-[0.98] cursor-pointer flex justify-center items-center gap-2">
                    + Kitabımı Listeye Ekle
                </button>
            </form>
        </div>

        <section class="space-y-4">
            <div class="flex justify-between items-center px-2">
                <h2 class="text-xl md:text-2xl font-bold text-purple-900 flex items-center gap-2">
                    ★ En Çok Okuyanlar
                </h2>
                <span class="text-[11px] font-bold text-purple-500 bg-white px-3 py-1.5 rounded-full border border-purple-100 shadow-xs">
                    ilk 5 okur
                </span>
            </div>
            <div id="leaderboardContainer" class="grid grid-cols-1 md:grid-cols-5 gap-3">
                <div class="col-span-full text-center py-6 text-slate-400 font-medium">
                    Sıralama hazırlanıyor...
                </div>
            </div>
        </section>

        <div class="space-y-6">
            <div class="flex justify-between items-center px-2">
                <h2 class="text-xl md:text-2xl font-bold text-purple-900 flex items-center gap-2">
                    Canlı Okuma Akışı <span class="animate-pulse text-sm bg-red-500 text-white px-2 py-0.5 rounded-full">CANLI</span>
                </h2>
                <button id="refreshBtn" class="text-indigo-600 hover:text-indigo-800 text-sm font-bold bg-white px-3 py-1.5 rounded-full shadow-xs border border-indigo-100 transition flex items-center gap-1 cursor-pointer">
                    ↻ Yenile
                </button>
            </div>
            
            <div id="cardsContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <div id="loadingText" class="col-span-full text-center py-12 text-slate-400 font-medium">
                    <span class="animate-pulse text-3xl text-indigo-500 block mb-3">...</span>
                    Kitaplar raflardan indiriliyor, lütfen bekle...
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-white border-t border-purple-100 py-4 text-center text-xs font-bold text-purple-400">
        © 2026 Cemal Dalgalı. Tüm hakları saklıdır.
    </footer>

    <script src="js/profanity-filter.js"></script>
    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzDVN2VTtqhggKGtAb5VWVDGfkDp7pSZMc5AYtHcJRmtya3p3IIcwiBI9AVzfThOK9cqg/exec";
        const PUBLIC_SCRIPT_URL = `${SCRIPT_URL}?view=public`;
        const SUBMIT_COOLDOWN_MS = 30000;

        function htmlKacir(value) {
            return String(value ?? "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function normalMetin(value) {
            return String(value ?? "")
                .normalize("NFKD")
                .toLocaleLowerCase("tr-TR")
                .replace(/[ıİ]/g, "i")
                .replace(/[çÇ]/g, "c")
                .replace(/[ğĞ]/g, "g")
                .replace(/[öÖ]/g, "o")
                .replace(/[şŞ]/g, "s")
                .replace(/[üÜ]/g, "u")
                .replace(/[\u0300-\u036f]/g, "")
                .replace(/[^a-z0-9]+/g, " ")
                .trim()
                .replace(/\s+/g, " ");
        }

        function normalOkulNo(value) {
            return String(value ?? "").replace(/\D/g, "");
        }

        function turkceBuyukYaz(value, fallback = "---") {
            const metin = String(value ?? "").trim();
            return metin ? metin.toLocaleUpperCase("tr-TR") : fallback;
        }

        function basitHash(value) {
            let hash = 2166136261;
            for (let i = 0; i < value.length; i++) {
                hash ^= value.charCodeAt(i);
                hash = Math.imul(hash, 16777619);
            }
            return (hash >>> 0).toString(16).padStart(8, "0");
        }

        async function ogrenciAnahtariOlustur(okulNo, adSoyad) {
            const hamAnahtar = `${normalOkulNo(okulNo)}|${normalMetin(adSoyad)}`;
            if (!hamAnahtar || hamAnahtar === "|") return "";

            if (window.crypto?.subtle) {
                const bytes = new TextEncoder().encode(hamAnahtar);
                const digest = await crypto.subtle.digest("SHA-256", bytes);
                return Array.from(new Uint8Array(digest))
                    .map((byte) => byte.toString(16).padStart(2, "0"))
                    .join("");
            }

            return basitHash(hamAnahtar);
        }

        function ogrenciYedekAnahtari(kitap) {
            const no = normalOkulNo(kitap.ogrenciNo || kitap.okulNo);
            const ad = normalMetin(kitap.ogrenciAdSoyad || kitap.ogrenciGorunenAd || kitap.adSoyad);
            return `${no}|${ad}`;
        }

        function sinifSubeAnahtari(kitap) {
            const sinif = String(kitap.sinif ?? "").trim();
            const sube = String(kitap.sube ?? "").trim().toLocaleUpperCase("tr-TR");
            return sinif || sube ? `${sinif}|${sube}` : "";
        }

        function alanOku(kayit, alanlar) {
            for (const alan of alanlar) {
                const deger = kayit?.[alan];
                if (deger !== undefined && deger !== null && String(deger).trim() !== "") {
                    return String(deger).trim();
                }
            }
            return "";
        }

        function puanOku(deger) {
            const normalizeDeger = Array.isArray(deger) ? deger.find(item => item !== undefined && item !== null && String(item).trim() !== "") : deger;
            if (typeof normalizeDeger === "number") {
                return Math.max(0, Math.min(5, normalizeDeger));
            }
            const sayi = parseFloat(String(normalizeDeger ?? "").trim().replace(",", "."));
            return Math.max(0, Math.min(5, Number.isFinite(sayi) ? sayi : 0));
        }

        function kayitPuani(kitap) {
            return puanOku([kitap?.puanOndalik, kitap?.puanNokta, kitap?.puanMetni, kitap?.puan]);
        }

        function liderlikVerisiOlustur(data) {
            const tablo = new Map();

            data.forEach((kitap, index) => {
                const anahtar = kitap.publicOkurId || kitap.ogrenciAnahtari || kitap.ogrenciKey || ogrenciYedekAnahtari(kitap);
                if (!anahtar || anahtar === "|") return;

                const mevcut = tablo.get(anahtar) || {
                    adSoyad: turkceBuyukYaz(kitap.ogrenciGorunenAd || kitap.adSoyad, "OKUR"),
                    okulNo: "",
                    sinif: "",
                    sube: "",
                    kitapSayisi: 0,
                    toplamPuan: 0,
                    sonIndex: index,
                    kitaplar: [],
                    sinifSubeSayilari: new Map()
                };

                const kitapPuani = kayitPuani(kitap);
                mevcut.kitapSayisi += 1;
                mevcut.toplamPuan += kitapPuani;
                mevcut.sonIndex = index;
                mevcut.kitaplar.push({
                    ad: turkceBuyukYaz(alanOku(kitap, ["kitapAdi", "kitap", "Kitap Adı", "Okuduğun Kitabın Adı"]), "KİTAP ADI YOK"),
                    puan: kitapPuani
                });

                const sinifSube = sinifSubeAnahtari(kitap);
                if (sinifSube) {
                    const onceki = mevcut.sinifSubeSayilari.get(sinifSube) || {
                        sinif: String(kitap.sinif ?? "").trim(),
                        sube: String(kitap.sube ?? "").trim().toLocaleUpperCase("tr-TR"),
                        adet: 0,
                        sonIndex: index
                    };
                    onceki.adet += 1;
                    onceki.sonIndex = index;
                    mevcut.sinifSubeSayilari.set(sinifSube, onceki);
                }

                tablo.set(anahtar, mevcut);
            });

            return Array.from(tablo.values())
                .map((ogrenci) => {
                    const secilenSinifSube = Array.from(ogrenci.sinifSubeSayilari.values())
                        .sort((a, b) => b.adet - a.adet || b.sonIndex - a.sonIndex)[0];

                    return {
                        ...ogrenci,
                        sinif: secilenSinifSube?.sinif || "",
                        sube: secilenSinifSube?.sube || "",
                        ortalamaPuan: ogrenci.kitapSayisi ? ogrenci.toplamPuan / ogrenci.kitapSayisi : 0
                    };
                })
                .sort((a, b) =>
                    b.kitapSayisi - a.kitapSayisi ||
                    b.ortalamaPuan - a.ortalamaPuan ||
                    a.sonIndex - b.sonIndex
                )
                .slice(0, 5);
        }

        function liderligiGuncelle(data) {
            const container = document.getElementById("leaderboardContainer");
            const liderler = liderlikVerisiOlustur(Array.isArray(data) ? data : []);

            if (liderler.length === 0) {
                container.innerHTML = `<div class="col-span-full text-center py-6 text-slate-400 font-medium">Henüz sıralama oluşmadı.</div>`;
                return;
            }

            container.innerHTML = liderler.map((ogrenci, index) => `
                <div class="bg-white border-2 ${index === 0 ? 'border-amber-300' : 'border-purple-100'} rounded-2xl p-4 shadow-sm">
                    <div class="flex items-center justify-between mb-3">
                        <span class="text-lg font-bold text-purple-900">#${index + 1}</span>
                        <span class="text-[11px] font-bold text-slate-500">${htmlKacir(ogrenci.sinif)}-${htmlKacir(ogrenci.sube)}</span>
                    </div>
                    <p class="text-sm font-bold text-slate-900 truncate">${htmlKacir(ogrenci.adSoyad)}</p>
                    <div class="mt-3 flex items-center justify-between text-xs font-bold">
                        <span class="text-emerald-700">${ogrenci.kitapSayisi} kitap</span>
                        <span class="text-amber-600">${ogrenci.ortalamaPuan.toFixed(1)} ★</span>
                    </div>
                    <ul class="mt-3 max-h-24 space-y-1 overflow-y-auto rounded-2xl bg-slate-50/80 p-2 text-[11px] font-bold text-slate-600">
                        ${ogrenci.kitaplar.map((kitap) => `
                            <li class="flex items-start justify-between gap-2">
                                <span class="min-w-0 flex-1 truncate">${htmlKacir(kitap.ad)}</span>
                                <span class="shrink-0 text-amber-600">${puanYaz(kitap.puan)} ★</span>
                            </li>
                        `).join("")}
                    </ul>
                </div>
            `).join("");
        }

        const subeler = ["D", "G", "H"];
        const subeSelect = document.getElementById("sube");
        subeler.forEach(s => {
            let opt = document.createElement("option"); opt.value = s; opt.textContent = s + " Şubesi"; subeSelect.appendChild(opt);
        });

        let secilenPuan = 0;
        const stars = document.querySelectorAll(".star-btn");
        const puanLabel = document.getElementById("puanLabel");
        stars.forEach(star => {
            star.addEventListener("pointerdown", puanSec);
            star.addEventListener("click", puanSec);
            star.addEventListener("mousemove", (event) => { guncelleYildizlar(puanHesapla(event, star)); });
            star.addEventListener("mouseleave", () => { guncelleYildizlar(secilenPuan); });
        });
        guncelleYildizlar(0);

        function puanSec(event) {
            event.preventDefault();
            const star = event.currentTarget;
            secilenPuan = puanHesapla(event, star);
            guncelleYildizlar(secilenPuan);
        }

        function puanHesapla(event, star) {
            const val = parseInt(star.getAttribute("data-value"));
            const rect = star.getBoundingClientRect();
            const solYari = event.clientX - rect.left < rect.width / 2;
            return Math.max(0.5, Math.min(5, val - (solYari ? 0.5 : 0)));
        }

        function puanYaz(puan) {
            return Number(puan).toFixed(1).replace(".0", "").replace(".", ",");
        }

        function yildizSvgHtml(durum) {
            const path = "M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z";
            const clipId = `halfStar-${Math.random().toString(36).slice(2, 10)}`;

            if (durum === "full") {
                return `<svg class="w-7 h-7" viewBox="0 0 24 24" aria-hidden="true"><path d="${path}" fill="currentColor"></path></svg>`;
            }

            if (durum === "half") {
                return `
                    <svg class="w-7 h-7" viewBox="0 0 24 24" aria-hidden="true">
                        <defs>
                            <clipPath id="${clipId}">
                                <rect x="0" y="0" width="12" height="24"></rect>
                            </clipPath>
                        </defs>
                        <path d="${path}" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"></path>
                        <path d="${path}" fill="currentColor" clip-path="url(#${clipId})"></path>
                    </svg>
                `;
            }

            return `<svg class="w-7 h-7" viewBox="0 0 24 24" aria-hidden="true"><path d="${path}" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"></path></svg>`;
        }

        function guncelleYildizlar(puan) {
            stars.forEach(star => {
                const val = parseInt(star.getAttribute("data-value"));
                star.classList.remove("text-amber-400", "text-slate-300");
                if (val <= puan) {
                    star.innerHTML = yildizSvgHtml("full");
                    star.classList.add("text-amber-400");
                } else if (val - 0.5 <= puan) {
                    star.innerHTML = yildizSvgHtml("half");
                    star.classList.add("text-amber-400");
                } else {
                    star.innerHTML = yildizSvgHtml("empty");
                    star.classList.add("text-slate-300");
                }
            });
            puanLabel.textContent = puan > 0 ? `${puanYaz(puan)} / 5 Yıldız` : "(Seçmedin)";
        }

        // Türkçe karakter güvenliği
        function maskeAdSoyad(text) {
            if (!text) return "---";
            return text.trim().split(/\s+/).map(kelime => {
                if(kelime.length === 0) return "";
                return kelime[0].toLocaleUpperCase('tr-TR') + "***";
            }).join(" ");
        }

        function maskeOkulNo(no) {
            if (!no) return "---";
            let str = no.toString().trim();
            if(str.length <= 1) return str; 
            if(str.length === 2) return str[0] + "*";
            return str[0] + "*".repeat(str.length - 2) + str[str.length - 1];
        }

        function verileriYukle() {
            const container = document.getElementById("cardsContainer");
            container.innerHTML = `<div class="col-span-full text-center py-12 text-slate-400 font-medium"><span class="animate-pulse text-3xl text-indigo-500 block mb-3">...</span>Kitaplar raflardan indiriliyor...</div>`;
            
            fetch(PUBLIC_SCRIPT_URL, { method: "GET", redirect: "follow" })
            .then(response => response.json())
            .then(data => {
                container.innerHTML = ""; 
                if(!data || data.length === 0 || data.status === "error") {
                    liderligiGuncelle([]);
                    container.innerHTML = `<div class="col-span-full text-center py-12 text-slate-400 font-medium">Henüz kitap girilmemiş. İlk sen ol.</div>`;
                    return;
                }

                liderligiGuncelle(data);

                const renkler = [
                    'from-rose-100 to-amber-100 border-rose-200 text-rose-950',
                    'from-sky-100 to-indigo-100 border-sky-200 text-sky-950',
                    'from-emerald-100 to-teal-100 border-emerald-200 text-emerald-950',
                    'from-violet-100 to-fuchsia-100 border-violet-200 text-violet-950',
                    'from-amber-100 to-yellow-100 border-amber-200 text-amber-950'
                ];

                data.forEach((kitap, index) => {
                    const secilenRenk = renkler[index % renkler.length];
                    let yildizlarHtml = "";
                    const yıldızSayısı = kayitPuani(kitap);
                    for(let i=1; i<=5; i++) {
                        if (i <= yıldızSayısı) {
                            yildizlarHtml += `<span class="text-amber-500">${yildizSvgHtml("full")}</span>`;
                        } else if (i - 0.5 <= yıldızSayısı) {
                            yildizlarHtml += `<span class="text-amber-500">${yildizSvgHtml("half")}</span>`;
                        } else {
                            yildizlarHtml += `<span class="text-slate-300">${yildizSvgHtml("empty")}</span>`;
                        }
                    }

                    const ucKelime = alanOku(kitap, ["ucKelime", "kitabiAnlatanUcKelime", "ucKelimeListesi", "Üç Kelime", "Uc Kelime", "Kitabı Anlatan En İyi Üç Kelime"]);
                    const alintiCumle = alanOku(kitap, ["alintiCumle", "alinti", "guzelAlinti", "Alıntı", "Alinti", "Kitapta Beğendiğin En Güzel Alıntı Cümle"]);
                    const onerirMi = alanOku(kitap, ["onerirMi", "arkadaslaraOneri", "tavsiye", "Öneri", "Oneri", "Arkadaşlarına Önerir misin?"]);

                    const detayHtml = `
                        ${ucKelime ? `
                        <div class="bg-white/50 p-3 rounded-2xl border border-white/50">
                            <p class="text-[10px] font-bold uppercase tracking-widest text-slate-500 mb-0.5">Üç Kelime</p>
                            <p class="text-xs font-bold text-slate-800">${htmlKacir(ucKelime)}</p>
                        </div>` : ""}
                        ${alintiCumle ? `
                        <div class="bg-white/50 p-3 rounded-2xl border border-white/50">
                            <p class="text-[10px] font-bold uppercase tracking-widest text-slate-500 mb-0.5">Alıntı</p>
                            <p class="text-xs italic font-medium leading-relaxed text-slate-700">"${htmlKacir(alintiCumle)}"</p>
                        </div>` : ""}
                        ${onerirMi ? `
                        <div class="flex items-center justify-between bg-white/50 p-3 rounded-2xl border border-white/50">
                            <p class="text-[10px] font-bold uppercase tracking-widest text-slate-500">Başkalarına Öneriyor mu?</p>
                            <p class="text-xs font-bold text-indigo-700">${htmlKacir(onerirMi)}</p>
                        </div>` : ""}
                    `;

                    const card = document.createElement("div");
                    card.className = `cool-card bg-gradient-to-br ${secilenRenk} border-2 rounded-3xl p-5 shadow-sm flex flex-col justify-between space-y-4`;
                    card.innerHTML = `
                        <div class="space-y-2">
                            <div class="flex justify-between items-center gap-2">
                                <span class="bg-white/90 px-3 py-1 rounded-full text-xs font-bold shadow-xs border border-white/50 text-indigo-700"># ${htmlKacir(kitap.sinif)}-${htmlKacir(kitap.sube)}</span>
                                <div class="flex bg-white/70 px-2 py-1 rounded-xl shadow-xs border border-white/40">${yildizlarHtml}</div>
                            </div>
                            <div>
                                <h3 class="text-sm font-bold tracking-tight">${htmlKacir(turkceBuyukYaz(kitap.ogrenciGorunenAd || kitap.adSoyad, "OKUR"))}</h3>
                            </div>
                        </div>

                        <div class="bg-white/60 p-3 rounded-2xl border border-white/50 shadow-inner">
                            <p class="text-[10px] font-bold uppercase tracking-widest text-slate-500 mb-0.5">Kitap</p>
                            <p class="text-xs font-bold text-slate-900 line-clamp-2">${htmlKacir(turkceBuyukYaz(kitap.kitapAdi, "KİTAP ADI YOK"))}</p>
                        </div>

                        ${detayHtml}

                        <div class="flex-grow">
                            <p class="text-[10px] font-bold uppercase tracking-widest text-slate-500 mb-0.5">Yorum</p>
                            <p class="text-xs italic font-medium leading-relaxed text-slate-700">"${htmlKacir(kitap.yorum)}"</p>
                        </div>
                    `;
                    container.appendChild(card);
                });
            })
            .catch(err => {
                console.error(err);
                liderligiGuncelle([]);
                container.innerHTML = `<div class="col-span-full text-center py-12 text-red-400 font-medium bg-red-50 rounded-2xl border-2 border-red-200">Veriler yüklenirken bir senkronizasyon hatası oluştu.</div>`;
            });
        }

        window.addEventListener("DOMContentLoaded", verileriYukle);
        document.getElementById("refreshBtn").addEventListener("click", verileriYukle);

        document.getElementById("readingForm").addEventListener("submit", async function(e) {
            e.preventDefault();
            if(secilenPuan === 0) { alert("Lütfen kitaba en az yarım yıldız vererek puanla."); return; }

            const sonGonderim = Number(localStorage.getItem("kitapSonGonderim") || 0);
            if (Date.now() - sonGonderim < SUBMIT_COOLDOWN_MS) {
                alert("Çok hızlı gönderim yapıyorsun. Lütfen biraz bekleyip tekrar dene.");
                return;
            }

            const hamYorum = document.getElementById("yorum").value.trim();
            const hamKitap = document.getElementById("kitapAdi").value.trim();
            const hamAd = document.getElementById("adSoyad").value.trim();
            const hamSinifKodu = document.getElementById("sinifKodu").value.trim();
            const hamUcKelime = document.getElementById("ucKelime").value.trim();
            const hamAlinti = document.getElementById("alintiCumle").value.trim();
            const onerirMi = document.getElementById("onerirMi").value;

            await KitapModerasyon.hazirOl();

            const yorumKontrol = KitapModerasyon.icerikUygunMu(hamYorum);
            const kitapKontrol = KitapModerasyon.icerikUygunMu(hamKitap);
            const adKontrol = KitapModerasyon.icerikUygunMu(hamAd);
            const sinifKoduKontrol = KitapModerasyon.icerikUygunMu(hamSinifKodu);
            const ucKelimeKontrol = KitapModerasyon.icerikUygunMu(hamUcKelime);
            const alintiKontrol = KitapModerasyon.icerikUygunMu(hamAlinti);

            if (!adKontrol.uygun) { alert(adKontrol.neden); return; }
            if (!kitapKontrol.uygun) { alert(kitapKontrol.neden); return; }
            if (!sinifKoduKontrol.uygun) { alert(sinifKoduKontrol.neden); return; }
            if (!ucKelimeKontrol.uygun) { alert(ucKelimeKontrol.neden); return; }
            if (!alintiKontrol.uygun) { alert(alintiKontrol.neden); return; }
            if (!yorumKontrol.uygun) { alert(yorumKontrol.neden); return; }

            const submitBtn = document.getElementById("submitBtn");
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="animate-pulse">...</span> Kitabın Kaydediliyor...';

            const sendData = async () => {
                const payload = {
                    ogrenciAnahtari: "",
                    ogrenciGorunenAd: maskeAdSoyad(hamAd),
                    ogrenciGorunenNo: maskeOkulNo(document.getElementById("okulNo").value),
                    adSoyad: maskeAdSoyad(hamAd),
                    okulNo: maskeOkulNo(document.getElementById("okulNo").value),
                    sinifKodu: hamSinifKodu,
                    sinif: document.getElementById("sinif").value,
                    sube: document.getElementById("sube").value,
                    kitapAdi: hamKitap,
                    ucKelime: hamUcKelime,
                    kitabiAnlatanUcKelime: hamUcKelime,
                    alintiCumle: hamAlinti,
                    alinti: hamAlinti,
                    onerirMi: onerirMi,
                    arkadaslaraOneri: onerirMi,
                    yorum: hamYorum,
                    puan: secilenPuan,
                    puanOndalik: secilenPuan,
                    puanNokta: secilenPuan.toFixed(1),
                    puanMetni: puanYaz(secilenPuan)
                };

                try {
                    const anahtar = await ogrenciAnahtariOlustur(document.getElementById("okulNo").value, hamAd);
                    payload.ogrenciAnahtari = anahtar;
                } catch (error) {
                    console.warn("Öğrenci anahtarı oluşturulamadı, yedek gruplama kullanılacak.", error);
                }

                fetch(SCRIPT_URL, {
                    method: "POST",
                    mode: "no-cors",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                })
                .then(() => {
                    localStorage.setItem("kitapSonGonderim", String(Date.now()));
                    alert("Harika! Kitap yorumun başarıyla eklendi.");
                    document.getElementById("readingForm").reset();
                    secilenPuan = 0; guncelleYildizlar(0);
                    setTimeout(verileriYukle, 2000);
                })
                .catch(error => { alert("Bir sorun oluştu."); console.error(error); })
                .finally(() => { submitBtn.disabled = false; submitBtn.innerHTML = '+ Kitabımı Listeye Ekle'; });
            };

            sendData();
        });
    </script>
</body>
</html>
